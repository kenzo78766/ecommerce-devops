apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kenzo78766/ecommerce-devops.git'
    targetRevision: main
    path: gitops
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: boutique
  # syncPolicy: {}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
